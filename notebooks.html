<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style2.css">
    <title>Shop</title>
    <style>
  .cards ul {
    display: flex;       
    flex-wrap: wrap;    
    list-style: none;
    padding: 0;
    justify-content: center; 
    gap: 20px;          
  }
  .cards ul li {
    width: calc(33.33% - 20px); 
    display: flex;
    flex-direction: column;    
    align-items: center;       
    text-align: center;        
    margin-bottom: 30px;
  }
  .cards img {
    width: 200px;
    height: auto;
    border-radius: 10px;
    display: block;
    margin-bottom: 10px; 
  }
  .cards h2 {
    font-size: 18px;
    margin: 0;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>
    <h1>Our Products</h1>
    <div class="cards">
        <ul>
            <li> 
                <h2>Kuromi notebooks</h2>
                <img src="kuromi notebooks.jpg" alt="Kuromi Books">
            </li>
            <li>
                <h2> Sinchan Notebook </h2>
                <img src="sinchan notebooks.jpg" alt="Sinchan Books">
            </li>
            <li>
                <h2> Cinnamoroll NoteBook  </h2>
                <img src="cinnamoroll notebooks.jpg" alt="Cinnamoroll Books">
            </li>
            <li>
                <h2> Hello Kitty NoteBook</h2>
                <img src="hellokitty note.jpg" alt=" HelloKitty Books ">
            </li>
            <li> <h2>Ribbon Notebook</h2>
            <img src="ribbon note.jpg" alt="Ribbons Books">
            </li>
            <li>
                <h2>Miffy Notebooks</h2>
                <img src="miffy notebook.jpg" alt="Miffy Books">
                
            </li>
        </ul>
    </div>
</body>
</html>
