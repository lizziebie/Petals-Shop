<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style2.css">
    <title>Shop</title>
    <style>
  .cards ul {
    display: flex;       
    flex-wrap: wrap;    
    list-style: none;
    padding: 0;
    justify-content: center; 
    gap: 20px;          
  }
  .cards ul li {
    width: calc(33.33% - 20px); 
    display: flex;
    flex-direction: column;    
    align-items: center;       
    text-align: center;        
    margin-bottom: 30px;
  }
  .cards img {
    width: 200px;
    height: auto;
    border-radius: 10px;
    display: block;
    margin-bottom: 10px; 
  }
  .cards h2 {
    font-size: 18px;
    margin: 0;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>
    <h1>Our Products</h1>
    <div class="cards">
        <ul>
            <li>
                <h2> Clear sticky notes</h2>
                <img src="Transclusent.jpg" alt=" Clear and grid">
            </li>
            <li>
                <h2> Bear Stickynotes  </h2>
                <img src="Blue bear.jpg" alt="Bear">
            </li>
            <li>
                <h2> Hello Kitty Sticky notes</h2>
                <img src="hello kitty sticky notes.jpg" alt=" HelloKitty Stickynotes ">
            </li>
        </ul>
    </div>
</body>
</html>
