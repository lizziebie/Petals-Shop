<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style2.css">
    <title>Shop</title>
    <style>
  .cards ul {
    display: flex;       
    flex-wrap: wrap;    
    list-style: none;
    padding: 0;
    justify-content: center; 
    gap: 20px;          
  }
  .cards ul li {
    width: calc(33.33% - 20px); 
    display: flex;
    flex-direction: column;    
    align-items: center;       
    text-align: center;        
    margin-bottom: 30px;
  }
  .cards img {
    width: 200px;
    height: auto;
    border-radius: 10px;
    display: block;
    margin-bottom: 10px; 
  }
  .cards h2 {
    font-size: 18px;
    margin: 0;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>
    <h1>Our Products</h1>
    <div class="cards">
        <ul>
            <li> 
                <h2>Kuromi Pens</h2>
                <img src="Kuromi Pens.jpg" alt="Kuromi">
            </li>
            <li>
                <h2> Sinchan Pens </h2>
                <img src="sinchanpens.jpg" alt="Sinchan">
            </li>
            <li>
                <h2> Cinnamoroll Pens  </h2>
                <img src="cinnamoroll pens.jpg" alt="Cinnamoroll">
            </li>
            <li>
                <h2> Hello Kitty</h2>
                <img src="hello kitty pens.jpg" alt=" HelloKitty Pens ">
            </li>
            <li> <h2>Ribbon Pens</h2>
            <img src="Ribbon pens.jpg" alt="Ribbons Pens">
            </li>
            <li>
                <h2>Miffy Pens</h2>
                <img src="Miffy Pens.jpg" alt="Miffy">
                
            </li>
        </ul>
    </div>
</body>
</html>
