<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Review Page</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      margin: 0;
      background: beige;
      padding: 30px;
    }
    .container {
      max-width: 900px;
      margin: auto;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    .review-form, .reviews {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    .review-card {
      border-bottom: 1px solid #eee;
      padding: 15px 0;
    }
    .review-card:last-child { border-bottom: none; }
    .stars { color: gold; font-size: 18px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Customer Reviews</h1><div class="review-form">
  <h2>Leave a Review</h2>
  <input type="text" id="name" placeholder="Your name" />
  <select id="rating">
    <option value="">Select rating</option>
    <option value="5">⭐⭐⭐⭐⭐</option>
    <option value="4">⭐⭐⭐⭐</option>
    <option value="3">⭐⭐⭐</option>
    <option value="2">⭐⭐</option>
    <option value="1">⭐</option>
  </select>
  <textarea id="comment" rows="4" placeholder="Write your review..."></textarea>
  <button onclick="addReview()">Submit Review</button>
</div>

<div class="reviews" id="reviews">
  <h2>What Customers Say</h2>
</div>

  </div>  <script>
    function addReview() {
      const name = document.getElementById('name').value;
      const rating = document.getElementById('rating').value;
      const comment = document.getElementById('comment').value;
      const reviews = document.getElementById('reviews');

      if (!name || !rating || !comment) {
        alert('Please fill all fields');
        return;
      }

      const card = document.createElement('div');
      card.className = 'review-card';
      card.innerHTML = `
        <h3>${name}</h3>
        <div class="stars">${'⭐'.repeat(rating)}</div>
        <p>${comment}</p>
      `;

      reviews.appendChild(card);

      document.getElementById('name').value = '';
      document.getElementById('rating').value = '';
      document.getElementById('comment').value = '';
    }
  </script></body>
</html>
